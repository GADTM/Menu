<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cluster GADTM</title>

<style>
body{
  font-family: Arial;
  margin:0;
  background:#eaf4fb;
}

header{
  background:#3692E3;
  color:white;
  padding:20px;
  text-align:center;
}

button{
  background:#28a745;
  color:white;
  border:none;
  padding:12px 20px;
  margin:15px;
  border-radius:8px;
  cursor:pointer;
  font-size:16px;
}

.container{
  max-width:900px;
  margin:auto;
}

.card{
  background:white;
  padding:15px;
  margin:15px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  white-space: pre-line;
}
</style>
</head>

<body>

<header>
  📡 CLUSTER RMDV
</header>

<div style="text-align:center">
  <button onclick="window.open('https://rmdv.org/cluster/','_blank')">
    📢 Publicar actividad
  </button>

  <button onclick="cargar()">
    🔄 Actualizar
  </button>
</div>

<div class="container" id="lista"></div>

<script>
async function cargar(){

  const res = await fetch("/.netlify/functions/telegram");
  const data = await res.json();

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
📡 NUEVA ACTIVIDAD

${m.texto}

<a href="${m.link}" target="_blank">🔗 Ver en Telegram</a>
`;

    cont.appendChild(div);
  });
}

cargar();
</script>

</body>
</html>
