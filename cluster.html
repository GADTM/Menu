<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Cluster GADTM</title>

<style>
body{
  font-family: sans-serif;
  background: linear-gradient(0deg, #b7d5e8, #eaf4fb);
  margin:0;
}

header{
  background: linear-gradient(0deg, rgba(183,213,232,1) 0%, rgba(54,146,227,1) 100%);
  color:yellow;
  padding:25px;
  text-align:center;
  font-size:30px;   /* 👈 TITULO MÁS GRANDE */
  font-weight:bold;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* BOTONES */
button{
  background:#3692E3;
  color:white;
  border:none;
  padding:12px 20px;
  margin:15px 10px;
  border-radius:6px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  transition:0.3s;
}

button:hover{
  background:#004c99;
  transform:scale(1.05);
}

/* CONTENEDOR */
.container{
  max-width:900px;
  margin:auto;
}

/* TARJETAS */
.card{
  background:white;
  padding:12px 14px;   /* menos aire interno */
  margin:10px 12px;    /* menos separación entre tarjetas */
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
  white-space:pre-line;
  font-size:15px;
  line-height:1.35;    /* 👈 CLAVE: compacta el texto */
}

.card div{
  margin:2px 0;
}

/* LINK */
.card a{
  display:inline-block;
  margin-top:10px;
  color:#007bff;
  text-decoration:none;
  font-weight:bold;
}

.card a:hover{
  text-decoration:underline;
}

.actions{
  text-align:center;
  margin:15px;
}

.actions button{
  margin:5px;
}
</style>
</head>

<body>

<header>
  📡 CLUSTER GADTM<br>
  <span style="font-size:18px;font-weight:normal;color:black;">
    Actividades de HamRadio QSO y eHamlog
  </span>
</header>

<div style="text-align:center">
<div class="actions">
  <button onclick="window.location.href='https://gadtm.netlify.app/'">
    🏠 Menú principal
  </button>

  <button onclick="window.open('https://rmdv.org/cluster/','_blank')">
    📢 Publicar actividad
  </button>

  <button onclick="cargar()">
    🔄 Actualizar
  </button>
</div>
</div>

<div class="container" id="lista"></div>

<script>
async function cargar(){

  const [r1, r2] = await Promise.all([
    fetch("/.netlify/functions/telegram").then(r => r.json()),
    fetch("/.netlify/functions/telegram2").then(r => r.json())
  ]);

  const data = [...r1, ...r2];

  const cont = document.getElementById("lista");
  cont.innerHTML = "";

  data.forEach(m => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
<div style="font-weight:bold; font-size:18px; margin-bottom:8px;">
📡 Actividad
</div>

<div>${m.texto}</div>

<a href="${m.link}" target="_blank">🔗 Ver en Telegram</a>
`;

    cont.appendChild(div);
  });
}

cargar();
</script>

</body>
</html>
